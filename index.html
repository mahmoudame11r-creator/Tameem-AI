<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تميم AI | Tameem AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #080808; color: #f0f0f0; font-family: sans-serif; overflow-x: hidden; }
        .tameem-glow { box-shadow: 0 0 20px rgba(34, 197, 94, 0.2); transition: 0.3s; }
        .tameem-glow:hover { box-shadow: 0 0 30px rgba(34, 197, 94, 0.4); }
        .protected-input:focus { border-color: #22c55e; outline: none; ring: 2px #14532d; }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <header class="p-6 flex justify-between items-center border-b border-zinc-800 bg-black/50 backdrop-blur-md sticky top-0 z-50">
        <h1 class="text-2xl font-bold text-green-500 tracking-widest">TAMEEM AI</h1>
        <button onclick="toggleLang()" id="langBtn" class="bg-zinc-800 px-5 py-2 rounded-full hover:bg-zinc-700 transition border border-zinc-700 text-sm font-medium">English</button>
    </header>

    <main class="flex-grow container mx-auto px-4 py-12 text-center">
        <div class="mb-16">
            <h2 id="heroTitle" class="text-5xl md:text-7xl font-extrabold mb-6 bg-gradient-to-r from-white to-zinc-500 bg-clip-text text-transparent italic">مستقبل محتوى الفيديو</h2>
            <p id="heroSub" class="text-zinc-400 text-xl max-w-2xl mx-auto">المنصة العالمية الأولى لإنشاء الأفاتار وفيديوهات الـ Analog الطويلة مجاناً وبأمان كامل</p>
        </div>

        <div class="w-full h-28 bg-zinc-900/50 border border-dashed border-zinc-700 mb-16 flex items-center justify-center rounded-2xl">
            <span class="text-zinc-500 font-medium">مساحة إعلانية آمنة | Secured Ads Area</span>
        </div>

        <div class="grid md:grid-cols-2 gap-10 max-w-6xl mx-auto text-right">
            <div class="bg-zinc-900/40 p-10 rounded-3xl border border-zinc-800 tameem-glow backdrop-blur-sm">
                <h3 id="tool1Title" class="text-2xl font-bold mb-6 text-green-400">إنشاء أفاتار ناطق</h3>
                <div class="space-y-6">
                    <div class="border-2 border-dashed border-zinc-700 p-6 rounded-xl hover:border-green-500 transition cursor-pointer">
                        <input type="file" id="avatarImg" class="hidden">
                        <label for="avatarImg" class="cursor-pointer text-zinc-400">رفع صورة الأفاتار</label>
                    </div>
                    <button id="btn1" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl transition-all transform hover:scale-[1.02]">ابدأ الإنتاج</button>
                </div>
            </div>

            <div class="bg-zinc-900/40 p-10 rounded-3xl border border-zinc-800 tameem-glow backdrop-blur-sm">
                <h3 id="tool2Title" class="text-2xl font-bold mb-6 text-green-400">مولد الفيديو (دقيقة كاملة)</h3>
                <div class="space-y-6 text-right" id="promptBox">
                    <textarea id="promptInput" placeholder="اكتب وصف الفيديو هنا..." class="w-full bg-black border border-zinc-800 p-4 rounded-xl protected-input h-32 text-right resize-none text-white"></textarea>
                    <button id="btn2" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-4 rounded-xl transition-all transform hover:scale-[1.02]">توليد فيديو طويل</button>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center border-t border-zinc-800 text-zinc-500 text-sm bg-black">
        <p>© 2026 Tameem AI Platform | Developed by Mahmoud Amer</p>
        <p class="mt-2 text-zinc-700">Protected by Tameem Guard v1.0</p>
    </footer>

    <script>
        let currentLang = 'ar';
        function toggleLang() {
            const isAr = currentLang === 'ar';
            document.documentElement.dir = isAr ? 'ltr' : 'rtl';
            document.getElementById('heroTitle').innerText = isAr ? 'Future of Video Content' : 'مستقبل محتوى الفيديو';
            document.getElementById('heroSub').innerText = isAr ? 'The first global platform for Free Avatars & Long Videos' : 'المنصة العالمية الأولى لإنشاء الأفاتار وفيديوهات الـ Analog الطويلة مجاناً وبأمان كامل';
            document.getElementById('tool1Title').innerText = isAr ? 'Talking Avatar Creator' : 'إنشاء أفاتار ناطق';
            document.getElementById('tool2Title').innerText = isAr ? 'Long Video Generator' : 'مولد الفيديو (دقيقة كاملة)';
            document.getElementById('btn1').innerText = isAr ? 'Start Production' : 'ابدأ الإنتاج';
            document.getElementById('btn2').innerText = isAr ? 'Generate Long Video' : 'توليد فيديو طويل';
            document.getElementById('promptInput').placeholder = isAr ? 'Enter video prompt here...' : 'اكتب وصف الفيديو هنا...';
            document.getElementById('promptInput').style.textAlign = isAr ? 'left' : 'right';
            document.getElementById('promptBox').style.textAlign = isAr ? 'left' : 'right';
            document.getElementById('langBtn').innerText = isAr ? 'العربية' : 'English';
            currentLang = isAr ? 'en' : 'ar';
        }
    </script>
</body>
</html>
