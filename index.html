<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Video Creator - أونلاين مجاناً</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #0f0f0f; color: white; margin: 0; overflow: hidden; }
        .glass { background: rgba(26, 26, 26, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #deff9a, #a2ff00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [prompt, setPrompt] = useState('');
            const [isGenerating, setIsGenerating] = useState(false);
            const [notification, setNotification] = useState(null);
            const [showSettings, setShowSettings] = useState(false);
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || '');
            const [scenes, setScenes] = useState([
                { id: 1, title: 'المشهد 1', status: 'empty', duration: '5s', script: '', prompt: '' },
                { id: 2, title: 'المشهد 2', status: 'empty', duration: '5s', script: '', prompt: '' },
                { id: 3, title: 'المشهد 3', status: 'empty', duration: '5s', script: '', prompt: '' },
                { id: 4, title: 'المشهد 4', status: 'empty', duration: '5s', script: '', prompt: '' },
                { id: 5, title: 'المشهد 5', status: 'empty', duration: '5s', script: '', prompt: '' },
                { id: 6, title: 'المشهد 6', status: 'empty', duration: '5s', script: '', prompt: '' },
            ]);

            const showToast = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            const saveSettings = () => {
                localStorage.setItem('gemini_api_key', apiKey);
                showToast('تم حفظ المفتاح بنجاح');
                setShowSettings(false);
            };

            const handleGenerate = async () => {
                if (!prompt) return showToast('اكتب فكرة أولاً', 'error');
                if (!apiKey) {
                    setShowSettings(true);
                    return showToast('يرجى إدخال مفتاح API', 'error');
                }

                setIsGenerating(true);
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: `Split this video idea into 6 scenes. Return ONLY a JSON array. Each object: {"script": "Arabic text", "prompt": "English visual description"}. Idea: ${prompt}` }] }]
                        })
                    });

                    const data = await response.json();
                    const rawText = data.candidates[0].content.parts[0].text;
                    const cleanJson = JSON.parse(rawText.match(/\[.*\]/s)[0]);

                    setScenes(cleanJson.map((s, i) => ({
                        ...scenes[i],
                        status: 'completed',
                        script: s.script,
                        prompt: s.prompt
                    })));
                    showToast('تم التوليد بنجاح!');
                } catch (error) {
                    showToast('حدث خطأ في الاتصال، تأكد من المفتاح', 'error');
                } finally {
                    setIsGenerating(false);
                }
            };

            return (
                <div className="h-screen flex flex-col overflow-hidden">
                    {/* Toast */}
                    {notification && (
                        <div className={`fixed top-5 left-1/2 -translate-x-1/2 z-[100] px-6 py-3 rounded-full shadow-2xl animate-bounce ${notification.type === 'error' ? 'bg-red-500' : 'bg-[#deff9a] text-black'} font-bold`}>
                            {notification.message}
                        </div>
                    )}

                    {/* Settings Modal */}
                    {showSettings && (
                        <div className="fixed inset-0 bg-black/90 backdrop-blur-md z-50 flex items-center justify-center p-4">
                            <div className="bg-[#1a1a1a] p-8 rounded-3xl border border-white/10 w-full max-w-md">
                                <h2 className="text-2xl font-black mb-6 gradient-text">إعدادات النظام أونلاين</h2>
                                <p className="text-gray-400 text-sm mb-4 leading-relaxed">أدخل مفتاح Gemini API ليتمكن التطبيق من العمل مباشرة من متصفحك دون الحاجة لسيرفر.</p>
                                <label className="text-xs text-gray-500 block mb-2 font-bold uppercase">Google Gemini API Key</label>
                                <input 
                                    type="password" 
                                    className="w-full bg-black border border-white/10 rounded-xl p-4 mb-6 outline-none focus:border-[#deff9a]" 
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                    placeholder="AIza..."
                                />
                                <button onClick={saveSettings} className="w-full bg-[#deff9a] text-black font-black py-4 rounded-xl hover:scale-95 transition-all shadow-lg shadow-[#deff9a]/10">حفظ وتشغيل</button>
                                <button onClick={() => setShowSettings(false)} className="w-full mt-3 text-gray-500 text-sm hover:text-white transition-colors">إغلاق</button>
                            </div>
                        </div>
                    )}

                    {/* Header */}
                    <header className="h-16 border-b border-white/5 flex items-center justify-between px-8 glass">
                        <h1 className="text-xl font-black tracking-tighter">V <span className="gradient-text">Studio</span></h1>
                        <div className="flex items-center gap-4">
                             <div className="text-[10px] bg-white/5 px-3 py-1 rounded-full border border-white/10 text-gray-400 hidden md:block">Serverless Mode On</div>
                             <button onClick={() => setShowSettings(true)} className="text-gray-400 hover:text-[#deff9a] transition-colors"><i className="fas fa-cog text-xl"></i></button>
                        </div>
                    </header>

                    {/* Content */}
                    <main className="flex-1 flex p-6 gap-6 overflow-hidden">
                        {/* Control Panel */}
                        <div className="w-full md:w-1/3 flex flex-col gap-6">
                            <div className="glass rounded-[2.5rem] p-8 flex flex-col h-full shadow-2xl">
                                <h3 className="text-lg font-bold mb-4 flex items-center gap-2">
                                    <i className="fas fa-magic text-[#deff9a]"></i> فكرة الفيديو
                                </h3>
                                <textarea 
                                    className="flex-1 bg-black/40 border border-white/5 rounded-3xl p-6 outline-none focus:border-[#deff9a] transition-all resize-none text-sm leading-relaxed placeholder:opacity-20"
                                    placeholder="اكتب هنا ما يدور في مخيلتك... مثلاً: قصة رائد فضاء يكتشف كوكباً من الألماس"
                                    value={prompt}
                                    onChange={(e) => setPrompt(e.target.value)}
                                />
                                <button 
                                    onClick={handleGenerate}
                                    disabled={isGenerating}
                                    className="mt-6 bg-[#deff9a] text-black font-black py-5 rounded-3xl hover:shadow-[0_0_30px_#deff9a44] transition-all flex items-center justify-center gap-3 disabled:opacity-50 active:scale-95"
                                >
                                    {isGenerating ? <i className="fas fa-spinner fa-spin"></i> : <><i className="fas fa-rocket"></i> توليد الآن</>}
                                </button>
                            </div>
                        </div>

                        {/* Preview Area (Hidden on small mobile for UX) */}
                        <div className="hidden md:flex flex-1 glass rounded-[3rem] overflow-hidden relative group">
                            <img src="https://images.unsplash.com/photo-1451187580459-43490279c0fa?auto=format&fit=crop&q=80&w=1200" className="w-full h-full object-cover opacity-40 group-hover:scale-105 transition-transform duration-[5000ms]" />
                            <div className="absolute inset-0 flex items-center justify-center bg-black/40">
                                <div className="text-center">
                                    <div className="w-20 h-20 bg-[#deff9a] rounded-full flex items-center justify-center mx-auto mb-4 shadow-2xl cursor-pointer hover:scale-110 transition-all border-4 border-black">
                                        <i className="fas fa-play text-black text-2xl ml-1"></i>
                                    </div>
                                    <p className="text-sm font-bold tracking-widest uppercase opacity-60">Preview Screen</p>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Timeline */}
                    <footer className="h-64 glass border-t border-white/5 p-6 flex flex-col gap-4">
                        <div className="flex justify-between items-center px-4">
                            <span className="text-[10px] font-black uppercase tracking-widest opacity-50">Timeline / 6 Scenes</span>
                            <div className="flex gap-2">
                                <button className="text-[10px] font-bold bg-white/5 px-4 py-2 rounded-full border border-white/10 hover:bg-[#deff9a] hover:text-black transition-all">تصدير MP4</button>
                            </div>
                        </div>
                        <div className="flex-1 flex gap-4 overflow-x-auto no-scrollbar pb-2">
                            {scenes.map(scene => (
                                <div key={scene.id} className={`min-w-[220px] rounded-2xl border transition-all ${scene.status === 'completed' ? 'border-[#deff9a]/30 bg-[#deff9a]/5' : 'border-white/5'} p-4 flex flex-col justify-between hover:border-[#deff9a]/40 group`}>
                                    <div className="flex justify-between items-center mb-2">
                                        <span className="text-[9px] font-bold opacity-40 group-hover:opacity-100 transition-opacity">{scene.title}</span>
                                        <span className="text-[9px] text-[#deff9a] font-bold">{scene.duration}</span>
                                    </div>
                                    <p className="text-[10px] line-clamp-3 italic text-gray-400 leading-relaxed">{scene.script || 'في انتظار كتابة السيناريو...'}</p>
                                    <div className="h-1 bg-white/5 mt-3 rounded-full overflow-hidden">
                                        <div className={`h-full bg-[#deff9a] transition-all duration-[2000ms] ${scene.status === 'completed' ? 'w-full' : 'w-0'}`}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
